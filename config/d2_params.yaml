# Deliverable 2 convergence-focused defaults.
#
# D1 remains unchanged. These params are for the D2 RL agent only.

# RL hyperparameters
alpha: 0.15
gamma: 0.95
epsilon: 0.20
epsilon_min: 0.03
epsilon_decay: 0.994

# Control frequency (Hz). One timer tick corresponds to one RL step.
control_hz: 6.0

# Training budget tuned to stay comfortably under 5 wall-clock hours on the VM
# in headless mode, including periodic greedy evaluations.
max_episodes: 360
max_steps_per_episode: 240
training_done_stop: true
checkpoint_every_episodes: 1
resume_training_state: true
reset_settle_seconds: 0.20
reset_retry_attempts: 3

# Fixed greedy evaluation of checkpoints.
eval_every_episodes: 20
eval_max_steps_per_start: 80
eval_failure_penalty: -25.0
eval_success_hold_steps: 12

# Reward shaping
reward_front_clear: 0.30
reward_front_blocked: -1.40
reward_right_good: 1.20
reward_right_too_close: -1.00
reward_right_too_far: -0.80
reward_heading_parallel: 0.35
reward_heading_off: -0.10
reward_progress_scale: 0.20
reward_too_far_preferred_turn: 0.80
reward_too_far_wrong_turn: -0.45
reward_too_far_straight_toward: -0.05
reward_too_far_straight_other: -0.40
reward_good_parallel_straight: 0.35
reward_good_parallel_turn: -0.55
reward_good_toward_soft: 0.30
reward_good_toward_hard: -0.05
reward_good_away_soft: 0.30
reward_good_away_hard: -0.05
reward_good_wrong_turn: -0.65
reward_good_straight_when_off: -0.55
reward_blocked_preferred_turn: 0.90
reward_blocked_wrong_turn: -1.10
reward_blocked_straight: -1.40

# Collision and instability handling
collision_distance: 0.30
collision_penalty: -8.00
trapped_position_epsilon: 0.008
trapped_yaw_epsilon: 0.08
trapped_steps_threshold: 12
trapped_penalty: -4.00
tilt_termination_deg: 55.0
z_termination_height: 0.25

# Test-only acquisition prior for arbitrary manual starts.
acquire_wall_enabled: false
acquire_wall_distance: 0.95
acquire_front_turn_distance: 0.85

# D2 encoder thresholds
front_blocked_threshold: 0.55
right_too_close: 0.55
right_too_far: 0.95
heading_parallel_tolerance: 0.10
opening_distance_threshold: 1.20

# D2 encoder sectors for Triton's project frame (+Y forward, scan angle 0 on +X)
front_sector_start_deg: 75.0
front_sector_end_deg: 105.0
right_front_sector_start_deg: 15.0
right_front_sector_end_deg: 65.0
right_rear_sector_start_deg: -70.0
right_rear_sector_end_deg: -20.0
front_left_open_sector_start_deg: 100.0
front_left_open_sector_end_deg: 155.0
front_right_open_sector_start_deg: 25.0
front_right_open_sector_end_deg: 85.0

# Gazebo reset model name
robot_model_name: triton

# Reproducibility
random_seed: 603

# Validated near-wall training seeds only.
start_poses:
  - {x: 1.286, y: 1.052, z: 0.00, yaw: 0.022}
  - {x: 1.460, y: -1.223, z: 0.00, yaw: 0.079}
  - {x: 3.343, y: -2.177, z: 0.00, yaw: -1.981}
  - {x: 3.157, y: 3.185, z: 0.00, yaw: -1.425}

# Fixed evaluation starts. These can be tuned on the VM, but the defaults are
# stable near-wall starts that span multiple map regions.
eval_start_poses:
  - {x: 1.286, y: 1.052, z: 0.00, yaw: 0.022}
  - {x: 1.460, y: -1.223, z: 0.00, yaw: 0.079}
  - {x: 3.343, y: -2.177, z: 0.00, yaw: -1.981}
  - {x: 3.157, y: 3.185, z: 0.00, yaw: -1.425}
  - {x: 2.350, y: 0.650, z: 0.00, yaw: -1.570}
