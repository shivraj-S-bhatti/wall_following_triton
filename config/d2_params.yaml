# Deliverable 2 parameter defaults for RL training/testing.
#
# This file is loaded under the rl_d2_agent node namespace in launch.
# You can tune values here without touching Python code.

# RL algorithm hyperparameters
alpha: 0.20
gamma: 0.95
epsilon: 0.20
epsilon_min: 0.05
epsilon_decay: 0.996

# Control frequency (Hz). Each timer tick performs one RL step.
control_hz: 6.0

# Training budget
max_episodes: 320
max_steps_per_episode: 500
training_done_stop: true
checkpoint_every_episodes: 1
resume_training_state: true
reset_settle_seconds: 0.20
reset_retry_attempts: 3

# Reward shaping terms
reward_right_good: 1.00
reward_right_too_close: -0.80
reward_right_too_far: -0.60
reward_heading_parallel: 0.60
reward_heading_off: -0.20
reward_front_safe: 0.20
reward_front_too_close: -2.50
reward_forward_scale: 0.50

# Collision handling
collision_distance: 0.30
collision_penalty: -8.00
trapped_position_epsilon: 0.008
trapped_yaw_epsilon: 0.08
trapped_steps_threshold: 12
trapped_penalty: -4.00
tilt_termination_deg: 55.0
z_termination_height: 0.25

# Test-mode acquisition prior for arbitrary spawn points.
# Handoff matches the wall-following state threshold so test-time search does
# not dump open-space behavior back onto the RL policy too early.
acquire_wall_enabled: false
acquire_wall_distance: 0.95
acquire_front_turn_distance: 0.90

# State encoder thresholds (same baseline as D1)
front_too_close: 0.55
right_too_close: 0.55
right_too_far: 0.95
heading_parallel_tolerance: 0.10
front_sector_start_deg: 75.0
front_sector_end_deg: 105.0
right_front_sector_start_deg: 20.0
right_front_sector_end_deg: 70.0
right_rear_sector_start_deg: -70.0
right_rear_sector_end_deg: -20.0

# Gazebo reset model name
robot_model_name: triton

# Reproducibility
random_seed: 603

# Candidate start poses used in train mode episode resets.
# These are the validated near-wall seeds. Raw captured poses remain in
# artifacts/captured_start_poses.yaml if you want to re-test them manually.
start_poses:
  - {x: 1.286, y: 1.052, z: 0.00, yaw: 0.022}
  - {x: 1.460, y: -1.223, z: 0.00, yaw: 0.079}
  - {x: 3.343, y: -2.177, z: 0.00, yaw: -1.981}
  - {x: 3.157, y: 3.185, z: 0.00, yaw: -1.425}
